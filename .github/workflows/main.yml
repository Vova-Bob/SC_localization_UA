name: GitHub Release Downloads

on:
  release:
    types:
      - created
      - edited

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Install goreleaser
        run: |
          wget -q https://github.com/goreleaser/goreleaser/releases/latest/download/goreleaser_Linux_x86_64.tar.gz
          tar xfz goreleaser_Linux_x86_64.tar.gz
          sudo mv goreleaser /usr/local/bin
          rm goreleaser_Linux_x86_64.tar.gz
        shell: bash

      - name: Download
        run: goreleaser
