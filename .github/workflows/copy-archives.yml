name: Copy Release Archives

on:
  push:
    branches:
      - main

jobs:
  copy_archives:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Change to Repl.it Project Directory
      run: cd /home/runner/work/SClocalisationBot/

    - name: Copy Release Archives to GitHub Workspace
      run: cp -r release/* $GITHUB_WORKSPACE

    - name: Commit and Push Changes
      run: |
        cd $GITHUB_WORKSPACE
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add .
        git commit -m "Update release archives"
        git push
